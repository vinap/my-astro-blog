<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b2b2b"/>
    </marker>
    <style>
      .box { fill:#f6f8fa; stroke:#2b2b2b; stroke-width:2px; rx:8; }
      .label { font:18px/1.2 'Segoe UI', Roboto, Arial, sans-serif; fill:#111827; }
      .sub { font:14px; fill:#374151; }
    </style>
  </defs>

  <!-- API Gateway -->
  <rect x="420" y="20" width="360" height="56" class="box"/>
  <text x="600" y="58" text-anchor="middle" class="label">API Gateway</text>

  <!-- Services -->
  <rect x="60" y="120" width="260" height="56" class="box"/>
  <text x="190" y="156" text-anchor="middle" class="label">Service A</text>

  <rect x="470" y="120" width="260" height="56" class="box"/>
  <text x="600" y="156" text-anchor="middle" class="label">Service B</text>

  <rect x="880" y="120" width="260" height="56" class="box"/>
  <text x="1010" y="156" text-anchor="middle" class="label">Service C</text>

  <!-- Arrows from gateway to services -->
  <line x1="600" y1="76" x2="190" y2="120" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="600" y1="76" x2="600" y2="120" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="600" y1="76" x2="1010" y2="120" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Services converge -->
  <line x1="190" y1="176" x2="600" y2="240" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="600" y1="176" x2="600" y2="240" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="1010" y1="176" x2="600" y2="240" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- AI Orchestrator -->
  <rect x="420" y="260" width="360" height="64" class="box"/>
  <text x="600" y="302" text-anchor="middle" class="label">AI Orchestrator</text>

  <!-- Components row -->
  <rect x="80" y="360" width="260" height="64" class="box"/>
  <text x="210" y="404" text-anchor="middle" class="label">Prompt Management</text>
  <text x="210" y="424" text-anchor="middle" class="sub">Versioned templates & tests</text>

  <rect x="470" y="360" width="260" height="64" class="box"/>
  <text x="600" y="404" text-anchor="middle" class="label">Retrieval (RAG)</text>
  <text x="600" y="424" text-anchor="middle" class="sub">Embeddings, index, similarity</text>

  <rect x="860" y="360" width="260" height="64" class="box"/>
  <text x="990" y="404" text-anchor="middle" class="label">Guardrails</text>
  <text x="990" y="424" text-anchor="middle" class="sub">Validation & safety checks</text>

  <!-- Arrows from orchestrator to components -->
  <line x1="600" y1="324" x2="210" y2="360" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="600" y1="324" x2="600" y2="360" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="600" y1="324" x2="990" y2="360" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- LLM -->
  <rect x="460" y="460" width="280" height="56" class="box"/>
  <text x="600" y="496" text-anchor="middle" class="label">LLM</text>

  <!-- Observability -->
  <rect x="420" y="540" width="360" height="64" class="box"/>
  <text x="600" y="584" text-anchor="middle" class="label">Observability</text>
  <text x="600" y="604" text-anchor="middle" class="sub">Logs + Traces + Metrics + Model Attribution</text>

  <!-- Arrows through LLM to Observability -->
  <line x1="600" y1="424" x2="600" y2="460" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="600" y1="516" x2="600" y2="540" stroke="#2b2b2b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Decorative background -->
  <rect x="10" y="10" width="1180" height="700" fill="none" stroke="#e6edf3" stroke-width="1" rx="12"/>
</svg>