name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Ensure this matches your default branch name
  workflow_dispatch: # Allows you to trigger it manually for testing

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # with:
        #   path: . # The root location of your Astro project
        #   node-version: 22 # Explicitly use the version you just installed

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4